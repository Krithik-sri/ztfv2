<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Trust Live Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00d2ff; }
        .container { max-width: 1000px; margin: 0 auto; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        .stat-card { background: #2a2a2a; padding: 15px 25px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 2em; font-weight: bold; display: block; }
        .stat-label { font-size: 0.9em; color: #888; }
        .live-feed { background: #222; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .feed-header { background: #333; padding: 15px; font-weight: bold; display: grid; grid-template-columns: 80px 150px 100px 1fr 100px 100px; gap: 10px; border-bottom: 2px solid #444; }
        .feed-item { padding: 12px 15px; display: grid; grid-template-columns: 80px 150px 100px 1fr 100px 100px; gap: 10px; border-bottom: 1px solid #333; align-items: center; transition: background 0.2s; }
        .feed-item:hover { background: #2a2a2a; }
        .status-allow { color: #4caf50; font-weight: bold; }
        .status-block { color: #f44336; font-weight: bold; }
        .status-challenge { color: #ff9800; font-weight: bold; }
        .risk-bar { height: 6px; background: #444; border-radius: 3px; overflow: hidden; width: 100%; }
        .risk-fill { height: 100%; transition: width 0.3s; }
        
        /* Auto-refresh indicator */
        .ping { width: 10px; height: 10px; background: #00d2ff; border-radius: 50%; display: inline-block; margin-left: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 210, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zero Trust Network Access <span class="ping"></span></h1>
        
        <div class="stats">
            <div class="stat-card">
                <span class="stat-value" id="total-reqs">0</span>
                <span class="stat-label">Total Requests</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="avg-trust" style="color: #4caf50;">100%</span>
                <span class="stat-label">Avg Trust Score</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="blocked-reqs" style="color: #f44336;">0</span>
                <span class="stat-label">Threats Blocked</span>
            </div>
        </div>

        <div class="live-feed">
            <div class="feed-header">
                <div>Time</div>
                <div>User</div>
                <div>Method</div>
                <div>Resource</div>
                <div>Trust</div>
                <div>Action</div>
            </div>
            <div id="feed-content">
                <!-- Events will be inserted here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
